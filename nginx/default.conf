# =============================================================================
# TEZ Operator 前端 nginx 反代配置（W1 占位版）
# 实际前端 SPA 由前端在 W3 完成，届时本文件可继续沿用此模板。
#   - / → Vue SPA 静态资源
#   - /api/ → 反代到 backend:8000
#   - /docs /openapi.json → 透传到 backend，方便接口调试
# =============================================================================

server {
    listen 80;
    server_name _;

    # 单页应用静态资源
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存策略（hash 文件长缓存，index.html 不缓存）
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API 反代到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # FastAPI 自动文档（内部用，可按需加 IP 白名单）
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查端点（运维 healthcheck.sh 也会调）
    location = /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # SPA 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 屏蔽常见探测
    location ~ /\.(git|env|svn|ht) {
        deny all;
        return 404;
    }
}
