                    - cell "编码分从 19.8 到 76.8" [ref=e438]:
                      - paragraph [ref=e439]: 编码分从 19.8 到 76.8
                  - row "实例资源池一期 写出内部命名和接口范围 关键接口名从几乎全部漏掉，到几乎全部命中" [ref=e440]:
                    - cell "实例资源池一期" [ref=e441]:
                      - paragraph [ref=e442]:
                        - link "实例资源池一期" [ref=e443] [cursor=pointer]:
                          - /url: https://tapd.woa.com/tapd_fe/20422209/story/detail/1020422209129643763
                    - cell "写出内部命名和接口范围" [ref=e444]:
                      - paragraph [ref=e445]: 写出内部命名和接口范围
                    - cell "关键接口名从几乎全部漏掉，到几乎全部命中" [ref=e446]:
                      - paragraph [ref=e447]: 关键接口名从几乎全部漏掉，到几乎全部命中
              - paragraph [ref=e448]:
                - text: 最典型的是一个批量查询的性能优化需求(
                - link "实例巨帧 MTU 批量优化" [ref=e449] [cursor=pointer]:
                  - /url: https://tapd.woa.com/tapd_fe/20422209/story/detail/1020422209125708339
                - text: )。原需求只是说「把逐个查询改成批量查询」。模型看到“性能优化”，自己补了一整套限流、熔断逻辑。但这个需求的瓶颈不在请求太多，而在没有批量接口。它写了很多代码，方向却错了，编码只有 19.8 分。
              - paragraph [ref=e450]: 第二次我们只加了一句话：
              - blockquote [ref=e451]:
                - paragraph [ref=e452]: 不引入限流、流控、熔断逻辑，性能问题通过批量查询本身解决。
              - paragraph [ref=e453]:
                - text: 模型没换，工具没换，编码分变成
                - strong [ref=e454]: "76.8"
                - text: 。
              - paragraph [ref=e455]: 这个case很典型：模型经常不是不会写，而是会把它熟悉的套路补进来。你没有告诉它「不要走这条路」，它就会按经验猜。
              - paragraph [ref=e456]: 如果要把需求写得更适合 AI，不需要一上来就写函数名，也不需要贴代码。真正有用的是这几类信息：
              - list [ref=e457]:
                - listitem [ref=e458]:
                  - paragraph [ref=e459]:
                    - strong [ref=e460]: 背景
                    - text: ：为什么要做，是性能问题、稳定性问题，还是业务规则变化；
                - listitem [ref=e461]:
                  - paragraph [ref=e462]:
                    - strong [ref=e463]: 判断维度
                    - text: ：按什么粒度判断，比如地域、可用区、机型、实例、资源池；
                - listitem [ref=e464]:
                  - paragraph [ref=e465]:
                    - strong [ref=e466]: 影响范围
                    - text: ：涉及哪些服务、仓库、接口、流程、调用链；
                - listitem [ref=e467]:
                  - paragraph [ref=e468]:
                    - strong [ref=e469]: 反向约束
                    - text: ：哪些方向明确不做，哪些旧逻辑不能动；
                - listitem [ref=e470]:
                  - paragraph [ref=e471]:
                    - strong [ref=e472]: 不可推导的信息
                    - text: ：外部系统协议、固定枚举、内部命名约定、接口字段格式。
              - paragraph [ref=e473]:
                - text: 最后一类尤其容易被低估。比如资源池相关需求里，标准命名是
                - code [ref=e474]: ResourcePoolPack
                - text: ，不是更自然的
                - code [ref=e475]: ResourcePool
                - text: 。这种命名不是模型靠常识能猜出来的，也不一定能靠检索召回。需求里写出来，命中率会直接变好。
              - paragraph [ref=e476]: 这和 Spec-Driven Development 的判断是一致的：当代码生成变得便宜，真正贵的是把意图表达准确。
              - paragraph [ref=e477]
              - paragraph [ref=e478]:
                - text: 根据上述优化方案沉淀的需求文档生成SKILL：
                - link "https://knot.woa.com/skills/detail/46593" [ref=e479] [cursor=pointer]:
                  - /url: https://knot.woa.com/skills/detail/46593
              - paragraph [ref=e480]
              - blockquote [ref=e481]:
                - paragraph [ref=e482]:
                  - text: Anthropic 和 OpenAI 的 Prompt 指南都把"说清楚上下文"列为第一条
                  - link "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#be-clear-and-direct" [ref=e483] [cursor=pointer]:
                    - /url: https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#be-clear-and-direct
              - separator [ref=e484]
              - heading "4. 需求不清晰，提问优先" [level=2] [ref=e485]
              - paragraph [ref=e486]:
                - img [ref=e494]
              - paragraph [ref=e495]: 复杂需求里，最危险的不是模型不会写代码，而是它不确定也不问，直接猜。
              - paragraph [ref=e496]: 有个 7 仓库需求，里面有灰度粒度、匹配维度、兼容策略等多个关键决策点。允许模型先提问、确认后再写，最终覆盖了大部分标准答案；不提问直接做的方案，基本都卡在 50 多分。
              - paragraph [ref=e497]: 可以在指令里直接写：
              - blockquote [ref=e498]:
                - paragraph [ref=e499]: 如果需求中存在多种合理解释，先列出来并提问；不要默认选择其中一种。
              - paragraph [ref=e500]
              - paragraph [ref=e501]: 尤其是这几类情况，最好让模型先问：
              - list [ref=e502]:
                - listitem [ref=e503]:
                  - paragraph [ref=e504]: 需求里出现「支持、兼容、优化」，但没有说具体范围；
                - listitem [ref=e505]:
                  - paragraph [ref=e506]: 有多个现有接口看起来都能复用；
                - listitem [ref=e507]:
                  - paragraph [ref=e508]: 命名、协议、枚举值来自外部系统，代码里查不到；
                - listitem [ref=e509]:
                  - paragraph [ref=e510]: 改动跨多个服务，调用链不完整。
              - paragraph [ref=e511]: 如果你没有时间回答问题，也至少让它先列假设。这样错误会暴露在设计阶段，而不是藏进代码里。
              - paragraph [ref=e512]
              - blockquote [ref=e513]:
                - paragraph [ref=e514]:
                  - text: Anthropic 在
                  - link "Claude Code 实践指南" [ref=e515] [cursor=pointer]:
                    - /url: https://www.anthropic.com/engineering/claude-code-best-practices
                  - text: 里专门有一节叫"Let Claude interview you"——思路完全一样：让 AI 先问再动手。
              - paragraph [ref=e516]
              - separator [ref=e517]
              - heading "5. 复杂需求多拆解，小步快跑" [level=2] [ref=e518]
              - paragraph [ref=e519]:
                - img [ref=e527]
              - paragraph [ref=e528]: 随着需求的复杂度增高，一次性编码的成功率会随其瀑布式下降，甚至在困难级别几乎全盘错误。
              - table [ref=e531]:
                - rowgroup [ref=e532]:
                  - row "需求规模 典型范围 一次性编码通过率" [ref=e533]:
                    - columnheader "需求规模" [ref=e534]:
                      - paragraph [ref=e535]: 需求规模
                    - columnheader "典型范围" [ref=e536]:
                      - paragraph [ref=e537]: 典型范围
                    - columnheader "一次性编码通过率" [ref=e538]:
                      - paragraph [ref=e539]: 一次性编码通过率
                  - row "低难度 1 个仓库，1 到 4 个文件" [ref=e540]:
                    - cell "低难度" [ref=e541]:
                      - paragraph [ref=e542]: 低难度
                    - cell "1 个仓库，1 到 4 个文件" [ref=e543]:
                      - paragraph [ref=e544]: 1 个仓库，1 到 4 个文件
                    - cell [ref=e545]:
                      - blockquote [ref=e546]:
                        - paragraph [ref=e547]: 95%
                  - row "中难度 1 到 3 个仓库 60% ~ 75%" [ref=e548]:
                    - cell "中难度" [ref=e549]:
                      - paragraph [ref=e550]: 中难度
                    - cell "1 到 3 个仓库" [ref=e551]:
                      - paragraph [ref=e552]: 1 到 3 个仓库
                    - cell "60% ~ 75%" [ref=e553]:
                      - paragraph [ref=e554]: 60% ~ 75%
                  - row "高难度 3 到 4 个仓库 <60%" [ref=e555]:
                    - cell "高难度" [ref=e556]:
                      - paragraph [ref=e557]: 高难度
                    - cell "3 到 4 个仓库" [ref=e558]:
                      - paragraph [ref=e559]: 3 到 4 个仓库
                    - cell "<60%" [ref=e560]:
                      - paragraph [ref=e561]: <60%
                  - row "困难 7 个仓库，上千行改动 ≈0%" [ref=e562]:
                    - cell "困难" [ref=e563]:
                      - paragraph [ref=e564]: 困难
                    - cell "7 个仓库，上千行改动" [ref=e565]:
                      - paragraph [ref=e566]: 7 个仓库，上千行改动
                    - cell "≈0%" [ref=e567]:
                      - paragraph [ref=e568]: ≈0%
              - paragraph [ref=e569]
              - paragraph [ref=e570]: 困难题不是模型完全不会，而是覆盖不全。
              - paragraph [ref=e571]: 比如一个跨 7 个仓库的镜像同步需求，标准答案有 1000 多行业务改动，模型只写了几十行核心逻辑。方向看起来对，但深度不够。另一个资源池需求，标准答案涉及计费、校验、调度、资源管理等多个系统，模型经常只做 API 和资源管理，漏掉计费或校验链路。
              - paragraph [ref=e572]: 所以复杂需求最好拆：
              - list [ref=e573]:
                - listitem [ref=e574]:
                  - paragraph [ref=e575]: 先让模型做影响面分析，列出涉及系统；
                - listitem [ref=e576]:
                  - paragraph [ref=e577]: 按系统拆成多个子任务；
                - listitem [ref=e578]:
                  - paragraph [ref=e579]: 每个子任务单独设计、单独编码、单独验证；
                - listitem [ref=e580]:
                  - paragraph [ref=e581]: 最后再检查跨系统接口是否一致。
              - paragraph [ref=e582]: 不要把跨 7 个仓库的大需求一次性丢给模型。它可能会给你一份看起来完整的方案，但实际代码只覆盖了最显眼的一半。
              - separator [ref=e583]
              - heading "最后，给 AI 派开发任务时可以按这张清单写" [level=2] [ref=e584]
              - table [ref=e587]:
                - rowgroup [ref=e588]:
                  - row "信息 要回答的问题" [ref=e589]:
                    - columnheader "信息" [ref=e590]:
                      - paragraph [ref=e591]: 信息
                    - columnheader "要回答的问题" [ref=e592]:
                      - paragraph [ref=e593]: 要回答的问题
                  - row "目标 这次改动到底解决什么问题？" [ref=e594]:
                    - cell "目标" [ref=e595]:
                      - paragraph [ref=e596]: 目标
                    - cell "这次改动到底解决什么问题？" [ref=e597]:
                      - paragraph [ref=e598]: 这次改动到底解决什么问题？
                  - row "范围 涉及哪些服务、接口、流程、场景？" [ref=e599]:
                    - cell "范围" [ref=e600]:
                      - paragraph [ref=e601]: 范围
                    - cell "涉及哪些服务、接口、流程、场景？" [ref=e602]:
                      - paragraph [ref=e603]: 涉及哪些服务、接口、流程、场景？
                  - row "约束 哪些方向明确不做？哪些旧逻辑不能动？" [ref=e604]:
                    - cell "约束" [ref=e605]:
                      - paragraph [ref=e606]: 约束
                    - cell "哪些方向明确不做？哪些旧逻辑不能动？" [ref=e607]:
                      - paragraph [ref=e608]: 哪些方向明确不做？哪些旧逻辑不能动？
                  - row "约定 有没有固定命名、协议、枚举、接口格式？" [ref=e609]:
                    - cell "约定" [ref=e610]:
                      - paragraph [ref=e611]: 约定
                    - cell "有没有固定命名、协议、枚举、接口格式？" [ref=e612]:
                      - paragraph [ref=e613]: 有没有固定命名、协议、枚举、接口格式？
                  - row "验收 怎么判断模型写对了？有哪些必须覆盖的测试场景？" [ref=e614]:
                    - cell "验收" [ref=e615]:
                      - paragraph [ref=e616]: 验收
                    - cell "怎么判断模型写对了？有哪些必须覆盖的测试场景？" [ref=e617]:
                      - paragraph [ref=e618]: 怎么判断模型写对了？有哪些必须覆盖的测试场景？
              - paragraph [ref=e619]: 尤其是「哪些不做」。结合我们的实践经验，一句反向约束比一大段正向描述更高效。
              - paragraph [ref=e620]: 最后可以说得朴素一点：
              - blockquote [ref=e621]:
                - paragraph [ref=e622]: AI 写代码的准确率，首先取决于你有没有把任务边界讲清楚；其次才是模型、工具和框架。
              - paragraph [ref=e623]:
                - text: 下次给模型派任务前，多花 30 秒想一句话：
                - strong [ref=e624]: 我有没有告诉它不要做什么？
              - separator [ref=e625]
              - heading "延伸阅读" [level=2] [ref=e626]
