              - paragraph [ref=e374]: 这套约束规则最早来自 Karpathy 对 LLM 编程的几条建议：先思考、优先简单方案、不乱重构、围绕目标做事。早期只注入这些准则时，确实有提升，但不稳定：设计阶段平均大约 +4.1，编码阶段大约 +8.7，有些用例准确率还会下降。
              - paragraph [ref=e375]: 因此针对我们的实际开发场景，沉淀了一些新的约束：
              - list [ref=e376]:
                - listitem [ref=e377]:
                  - paragraph [ref=e378]: 新增文件、类、常量前，先搜索同仓库已有命名；
                - listitem [ref=e379]:
                  - paragraph [ref=e380]: 修改函数前，追踪入参，确认变量在这个位置是否已经存在；
                - listitem [ref=e381]:
                  - paragraph [ref=e382]: 跨仓库新增接口时，写清楚字段名、类型、大小写风格；
                - listitem [ref=e383]:
                  - paragraph [ref=e384]: 写完设计后，按覆盖完整性、过度工程、命名一致性、最小可工作集做自查；
                - listitem [ref=e385]:
                  - paragraph [ref=e386]: 编码阶段检查是否真的产生了 git diff，避免模型漏写。
              - paragraph [ref=e387]
              - blockquote [ref=e388]:
