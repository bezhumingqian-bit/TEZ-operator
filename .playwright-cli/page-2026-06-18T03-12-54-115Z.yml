            - generic [ref=e165]: 丨 导语 过去几个月，我们一直在探索提升模型写代码能力的方案，为了验证这些方案是否真的有提升，我们搭了一个叫 CVM-Bench 的内部评测——从腾讯云 CVM 日常开发中选 20 个真实需求当考题，以工程师实际合入的代码做标准答案，让 AI 独立完成后打分。
            - generic [ref=e172]:
