version: "3.9"

# TEZ Operator 工位机部署
# - MySQL/Redis 只绑 127.0.0.1，不对外暴露
# - backend/frontend 绑 0.0.0.0，5-20 人内部访问
# - 数据卷在 ./data，日志在 ./logs，均已 gitignore
#
# app profile 可启动整站：
#   docker compose --profile app up -d --build
# 如需先跑基础设施，可执行：
#   docker compose up -d mysql redis

services:
  mysql:
    image: mysql:8.0
    container_name: tez-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_strong_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tez_operator}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tez-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tez-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./logs/backend:/app/logs
    environment:
      TEZ_APP_ENV: ${TEZ_APP_ENV:-local}
      TEZ_APP_DEBUG: ${TEZ_APP_DEBUG:-false}
      TEZ_DATABASE_URL: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-change_me_strong_password}@mysql:3306/${MYSQL_DATABASE:-tez_operator}?charset=utf8mb4"
      TEZ_REDIS_URL: redis://redis:6379/0
      TEZ_CMDB_MODE: ${TEZ_CMDB_MODE:-mock}
      TEZ_TCUM_MODE: ${TEZ_TCUM_MODE:-mock}
      TEZ_IDCRM_MODE: ${TEZ_IDCRM_MODE:-mock}
    profiles:
      - app

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: tez-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - app

networks:
  default:
    name: tez-network
